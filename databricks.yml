# This is a Declarative Automation Bundle definition for ifood-case.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: ifood-case

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-441c4e73-bb89.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-441c4e73-bb89.cloud.databricks.com
      root_path: /Workspace/Users/ramoslucas.lr@gmail.com/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    bronze_to_silver_pipeline:
      name: "NYC TLC: Bronze to Silver Pipeline"
      environments:
        - environment_key: serverless_env
          spec:
            environment_version: "5"
      parameters:
        - name: "dataset"
          default: "yellow"
        - name: "bronze_path"
          default: "s3a://ifood-case-lucas-datalake-762131618299-us-east-2-an/bronze/nyc_tlc/yellow/ano=2023/mes=01/data.parquet"
        - name: "silver_path"
          default: "s3a://ifood-case-lucas-datalake-762131618299-us-east-2-an/silver/nyc_tlc/yellow/"
        - name: "table_name"
          default: "default.silver_nyc_tlc_yellow"
        - name: "partition_keys"
          default: "ano,mes"
        - name: "partition_values"
          default: "2023,01"
      tasks:
        - task_key: "process_yellow_taxi"
          environment_key: "serverless_env"
          spark_python_task:
            python_file: "src/databricks/bronze_to_silver_job.py"
            parameters:
              - "--dataset"
              - "{{job.parameters.dataset}}"
              - "--bronze-path"
              - "{{job.parameters.bronze_path}}"
              - "--silver-path"
              - "{{job.parameters.silver_path}}"
              - "--table-name"
              - "{{job.parameters.table_name}}"
              - "--partition-keys"
              - "{{job.parameters.partition_keys}}"
              - "--partition-values"
              - "{{job.parameters.partition_values}}"
