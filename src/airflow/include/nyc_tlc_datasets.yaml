global_settings:
  s3_bucket: "ifood-case-lucas-datalake-762131618299-us-east-2-an"
  s3_raw_prefix: "raw/nyc_tlc"
  s3_bronze_prefix: "bronze/nyc_tlc"
  s3_silver_prefix: "silver/nyc_tlc"
  s3_gold_prefix: "gold/nyc_tlc"

datasets:
  - name: "yellow"
    endpoint_template: "trip-data/yellow_tripdata_{{ logical_date.strftime('%Y-%m') }}.parquet"
    silver_rule: "nyc_yellow_taxi"
    marts:
      - name: "monthly_revenue"
        table_name: "default.gold_nyc_tlc_monthly_revenue"
      - name: "hourly_passengers"
        table_name: "default.gold_nyc_tlc_hourly_passengers"